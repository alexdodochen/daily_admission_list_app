name: Build + Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Need write access to create releases + upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # All three LLM SDKs must be installed so PyInstaller picks them up
          # via the hidden-imports list in packaging.spec.
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-chromium-1208

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $sha = (git rev-parse HEAD).Trim()
          $short = $sha.Substring(0, 7)
          $date = (Get-Date -Format "yyyyMMdd-HHmm")
          $tag = "v$date-$short"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "short=$short" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "Tag: $tag"

      - name: Stamp app/VERSION
        shell: pwsh
        run: |
          $built = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $version = @{
            tag = "${{ steps.ver.outputs.tag }}"
            sha = "${{ steps.ver.outputs.sha }}"
            short = "${{ steps.ver.outputs.short }}"
            built_at = $built
            built_by = "github-actions"
          } | ConvertTo-Json
          $version | Out-File -FilePath app/VERSION -Encoding utf8 -NoNewline
          Get-Content app/VERSION

      - name: Build with PyInstaller
        run: python -m PyInstaller packaging.spec --noconfirm

      - name: Verify build
        shell: pwsh
        run: |
          $bundle = "行政總醫師.排班.Key班.入院"
          $exe = "dist/$bundle/$bundle.exe"
          if (-not (Test-Path $exe)) { throw "Build missing: $exe" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Output ("Built {0} ({1:N1} MB)" -f $exe, $size)
          # Folder size sanity check
          $total = (Get-ChildItem "dist/$bundle" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Output ("Total folder: {0:N0} MB" -f $total)

      - name: Zip distribution
        shell: pwsh
        run: |
          # Put the end-user guide at the bundle ROOT (next to the exe).
          # Can't do this via packaging.spec datas — PyInstaller 6.x onedir
          # forces datas into _internal/ where users won't find it.
          Copy-Item "使用方法.txt" "dist/行政總醫師.排班.Key班.入院/使用方法.txt" -Force
          cd dist
          # Bundle folder + exe are Chinese (行政總醫師.排班.Key班.入院.exe);
          # the RELEASE ASSET filename must stay ASCII or action-gh-release
          # mangles the non-ASCII name to "default.zip". So zip to an ASCII
          # name — the Chinese folder/exe are preserved INSIDE the zip.
          Compress-Archive -Path "行政總醫師.排班.Key班.入院" -DestinationPath "admission-app.zip" -Force
          $zipSize = (Get-Item "admission-app.zip").Length / 1MB
          Write-Output ("Zip: {0:N1} MB" -f $zipSize)

      - name: Upload artifact (debug only — kept for 7d)
        uses: actions/upload-artifact@v4
        with:
          name: admission-app-${{ steps.ver.outputs.tag }}
          path: dist/admission-app.zip
          retention-days: 7

      - name: Create GitHub Release + upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            自動建置 — commit `${{ steps.ver.outputs.short }}`

            **安裝**：下載 `admission-app.zip` → 解壓到任何資料夾 → 雙擊 `行政總醫師.排班.Key班.入院.exe`。
            **更新**：app 內按「更新」按鈕，會自動下載最新 release 並換檔重啟。

            設定檔位置 `%LOCALAPPDATA%\admission-app\config.json` — 更新不會覆蓋。
          generate_release_notes: true
          files: dist/admission-app.zip
