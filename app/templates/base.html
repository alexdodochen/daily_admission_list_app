<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>每日入院名單 — 本地版</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="topbar">
  <div class="brand">🩺 每日入院名單</div>
  <nav>
    <a href="/">工作流程</a>
    <a href="/settings">設定</a>
  </nav>
  <div id="upstream-bar" class="upstream-bar">
    <button id="upstream-toggle" class="upstream-toggle" type="button" hidden>
      <span class="dot upd"></span>
      <span id="upstream-count">0</span> 個來源有更新
    </button>
    <div id="upstream-panel" class="upstream-panel" hidden>
      <div class="upstream-row" data-source="self">
        <span class="upstream-label">本 App</span>
        <span class="upstream-status">…</span>
        <button class="upstream-sync mini" data-source="self" hidden>同步</button>
      </div>
      <div class="upstream-row" data-source="admission">
        <span class="upstream-label">入院清單上游</span>
        <span class="upstream-status">…</span>
        <button class="upstream-sync mini" data-source="admission" hidden>同步</button>
      </div>
      <div class="upstream-row" data-source="schedule">
        <span class="upstream-label">排班 / Key 班上游</span>
        <span class="upstream-status">…</span>
        <button class="upstream-sync mini" data-source="schedule" hidden>同步</button>
      </div>
    </div>
  </div>
  <div class="status">
    {% if ready %}
      <span class="dot ok"></span> {{ cfg.llm_provider }} / {{ cfg.sheet_id[:8] }}…
    {% else %}
      <span class="dot bad"></span> 尚未設定
    {% endif %}
  </div>
</header>
<main>
{% block body %}{% endblock %}
</main>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
